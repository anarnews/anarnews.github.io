backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "veritabani"
    label: "Haber Veritabani"
    files:
      - label: "Tum Haberleri Yonet"
        name: "haberler"
        file: "haberler.json"
        fields:
          - label: "Haber Listesi"
            name: "haber_listesi"
            widget: "list"
            collapsed: false
            summary: '{{fields.title}}'
            fields:
              - {label: "Baslik", name: "title", widget: "string"}
              - {label: "Yayin Tarihi", name: "date", widget: "datetime"}
              - {label: "Kapak Resmi", name: "thumbnail", widget: "image", required: false}
              - {label: "Yazar", name: "author", widget: "string", default: "Ahmet Nar"}
              - {label: "Ozet (Ana Sayfada Cikacak)", name: "description", widget: "text"}
              - {label: "Haber Icerigi", name: "body", widget: "markdown"}
