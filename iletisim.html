<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - AnarNews</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.jpg" type="image/jpeg">
</head>
<body>

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="close-btn" onclick="closeNav()">&times;</a>
        <img src="logo.jpg" alt="AnarNews Logo" class="sidebar-logo" onerror="this.style.display='none'">
        <a href="index.html">Ana Sayfa</a>
        <button class="dropdown-btn">Kategoriler &#9660;</button>
        <div class="dropdown-container">
            <a href="index.html?kategori=Son Dakika">Son Dakika</a>
            <a href="index.html?kategori=Siyaset">Siyaset</a>
            <a href="index.html?kategori=Ekonomi">Ekonomi</a>
            <a href="index.html?kategori=Spor">Spor</a>
            <a href="index.html?kategori=Teknoloji">Teknoloji</a>
            <a href="index.html?kategori=Kültür-Sanat">Kültür-Sanat</a>
        </div>
        <a href="yazarlar.html">Yazarlar</a>
        <a href="iletisim.html">İletişim</a>
    </div>

    <div class="top-section-fixed">
        <header>
            <nav>
                <div class="logo-container">
                    <a href="index.html"><img src="logo.jpg" alt="AnarNews Logo" class="logo-img"></a>
                </div>
                <div class="menu-btn" onclick="openNav()">&#9776;</div>
            </nav>
        </header>
        <section class="hero"><h1>BİZE ULAŞIN</h1></section>
    </div>

    <div class="content-curtain" style="margin-top: 50vh;">
        <div class="wave-divider"><svg viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" fill="#f4f4f9"></path></svg></div>
        <section class="news-section">
            <div class="contact-form-container" style="max-width: 800px; margin: 0 auto;">
                <h2>Yardım Bileti / Mesaj Gönder</h2>
                
                <form name="iletisim-bileti" method="POST" data-netlify="true" class="contact-form">
                    <div class="form-group">
                        <label>Adınız Soyadınız</label>
                        <input type="text" name="isim" required>
                    </div>
                    <div class="form-group">
                        <label>E-Posta</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Mesajınız</label>
                        <textarea name="mesaj" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Bileti Gönder</button>
                </form>
                
            </div>
        </section>
    </div>

    <script>
        /* ORTAK MENÜ VE KAYDIRMA EFEKTİ SİSTEMİ */
        function openNav() { document.getElementById("mySidebar").style.width = "300px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
        var dropdown = document.getElementsByClassName("dropdown-btn");
        for (var i = 0; i < dropdown.length; i++) {
            dropdown[i].addEventListener("click", function() {
                this.classList.toggle("active");
                var dropdownContent = this.nextElementSibling;
                if (dropdownContent.style.display === "block") dropdownContent.style.display = "none";
                else dropdownContent.style.display = "block";
            });
        }
        window.addEventListener('scroll', function() {
            var heroes = document.querySelectorAll('.hero');
            heroes.forEach(function(hero) {
                var opacity = 1 - (window.scrollY / 350);
                hero.style.opacity = opacity > 0 ? opacity : 0;
            });
        });
    </script>
</body>
</html>
