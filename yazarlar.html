    <div class="top-section-fixed">
        <header>
            <nav>
                <div class="logo-container">
                    <a href="index.html"><img src="logo.jpg" alt="AnarNews Logo" class="logo-img"></a>
                </div>
                <div class="menu-btn" onclick="openNav()">&#9776;</div>
            </nav>
        </header>
        <section class="hero"><h1>YAZAR KADROMUZ</h1></section>
    </div>

    <div class="content-curtain" style="margin-top: 50vh;">
        <div class="wave-divider"><svg viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" fill="#f4f4f9"></path></svg></div>
        <section class="news-section">
            <div class="authors-grid" id="authors-container">
                <p style="text-align: center;">Yazarlar yükleniyor...</p>
            </div>
        </section>
    </div>

    <script>
        function openNav() { document.getElementById("mySidebar").style.width = "300px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
        var dropdown = document.getElementsByClassName("dropdown-btn");
        for (var i = 0; i < dropdown.length; i++) {
            dropdown[i].addEventListener("click", function() {
                this.classList.toggle("active");
                var dropdownContent = this.nextElementSibling;
                if (dropdownContent.style.display === "block") dropdownContent.style.display = "none";
                else dropdownContent.style.display = "block";
            });
        }
        window.addEventListener('scroll', function() {
            var heroes = document.querySelectorAll('.hero');
            heroes.forEach(function(hero) {
                var opacity = 1 - (window.scrollY / 350);
                hero.style.opacity = opacity > 0 ? opacity : 0;
            });
        });

        fetch('yazarlar.json?v=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('authors-container');
                if (!data.yazar_listesi) return container.innerHTML = "<p>Henüz yazar profili oluşturulmamış.</p>";
                
                let html = '';
                data.yazar_listesi.forEach(yazar => {
                    const img = yazar.avatar ? yazar.avatar : 'https://via.placeholder.com/150';
                    html += `
                    <a href="yazar-detay.html?ad=${encodeURIComponent(yazar.name)}" class="author-card">
                        <img src="${img}" alt="${yazar.name}">
                        <h3>${yazar.name}</h3>
                        <p style="color:#888;">Profili Gör</p>
                    </a>`;
                });
                container.innerHTML = html;
            });
    </script>
</body>
